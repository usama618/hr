name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production

    env:
      APP_ENV: prod
      APP_DEBUG: '0'
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Validate Composer
        run: composer validate --strict --no-check-publish

      - name: Install dependencies for checks
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lint PHP
        run: find src migrations public -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Lint Twig
        run: php bin/console lint:twig templates

      - name: Lint container
        run: php bin/console lint:container

      - name: Validate deployment secrets
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_PORT"
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env.local' \
            --exclude='.env.*.local' \
            --exclude='var/' \
            --exclude='vendor/' \
            --exclude='public/uploads/' \
            ./ "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/"

      - name: Run production commands
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" "cd '$DEPLOY_PATH' && \
            export APP_ENV=prod APP_DEBUG=0 && \
            mkdir -p var/cache var/log public/uploads/profiles && \
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist && \
            php bin/console doctrine:migrations:migrate --no-interaction && \
            php bin/console cache:clear --env=prod --no-debug && \
            php bin/console cache:warmup --env=prod --no-debug"
