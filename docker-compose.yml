services:
  app:
    build: .
    ports:
      - "8090:8000"
    volumes:
      - profile_uploads:/app/public/uploads/profiles
    environment:
      APP_ENV: dev
      APP_SECRET: change-me-in-production
      DATABASE_URL: mysql://hr:hr@database:3306/hr?serverVersion=8.4&charset=utf8mb4
      SUPER_ADMIN_EMAIL: admin@example.com
      SUPER_ADMIN_PASSWORD: password
      SUPER_ADMIN_NAME: Super Admin
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: hr
      MYSQL_USER: hr
      MYSQL_PASSWORD: hr
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "hr", "-phr"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  profile_uploads:
